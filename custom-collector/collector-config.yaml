receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - http://*

processors:
  cprocessor:
    environment: micro_market
    add_log_attribute: true
    redact_user_email: true
  batch:

exporters:
  debug:
    verbosity: detailed

  otlphttp/logs:
    endpoint: http://grafana-otel:3100/otlp
    tls:
      insecure: true

service:
  pipelines:
    logs:
      receivers: [ otlp ]
      processors: [ batch, cprocessor ]
      exporters: [ otlphttp/logs ]
      # exporters: [ debug, otlphttp/logs ]
