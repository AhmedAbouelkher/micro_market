services:  
  invoice:
    build:
      context: ./invoice-service
      dockerfile: Dockerfile
    environment:
      HTTP_PORT: 8080
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICE_NAME: invoice-service
      SERVICE_VERSION: 0.8.4
      REDIS_CHANNEL: create_invoice
    volumes:
      - invoice-db:/usr/src/app/data
    ports:
      - "4123:8080"
    depends_on:
      - redis

  checkout:
    build:
      context: .
      dockerfile: checkout-service/Dockerfile
    environment:
      OTEL_COLLECTOR_ENDPOINT: grafana-otel:4317
      INVENTORY_SERVICE_ADDRESS: inventory:50051
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVICE_NAME: checkout-service
      SERVICE_VERSION: 0.0.1
      REDIS_CHANNEL: create_invoice
    volumes:
      - checkout-db:/usr/src/app/data
    ports:
      - "8880:1234"
      # - "8080:50051"
    depends_on:
      - redis

  inventory:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    environment:
      OTEL_COLLECTOR_ENDPOINT: grafana-otel:4317
      CHECKOUT_SERVICE_ADDRESS: checkout:50051
      SERVICE_NAME: inventory-service
      SERVICE_VERSION: 0.5.2
      OTEL_LOGS_ENDPOINT: custom_collector:4317 
    volumes:
      - inventory-db:/usr/src/app/data
    ports:
      - "9999:1234"
      # - "9099:50051"
    depends_on:
      - checkout
  
  custom_collector:
    build:
      context: ./custom-collector
      dockerfile: Dockerfile
    volumes:
      - ./custom-collector/collector-config.yaml:/otelcol/collector-config.yaml:ro

  redis:
    image: redis:8.4.2-alpine

  grafana-otel:
    image: grafana/otel-lgtm:latest
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS}
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
    ports:
      - "4317:4317"
      - "4318:4318"
      - "3000:3000"
      - "3200:3200"
      - "4040:4040"
      - "9090:9090"

volumes:
  checkout-db:
  inventory-db:
  invoice-db: