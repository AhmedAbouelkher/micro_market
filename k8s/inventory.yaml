apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory
  template:
    metadata:
      labels:
        app: inventory
    spec:
      containers:
        - name: inventory
          image: inventory-service:local
          ports:
            - containerPort: 1234
            - containerPort: 50051
          env:
            - name: OTEL_COLLECTOR_ENDPOINT
              value: grafana-otel:4317
            - name: CHECKOUT_SERVICE_ADDRESS
              value: checkout:50051
            - name: SERVICE_NAME
              value: inventory-service
            - name: SERVICE_VERSION
              value: 0.5.2
          readinessProbe:
            tcpSocket:
              port: 1234
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 1234
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: inventory
spec:
  selector:
    app: inventory
  ports:
    - name: http
      port: 1234
      targetPort: 1234
    - name: grpc
      port: 50051
      targetPort: 50051
